<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Oficial</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">Mi E-Commerce</div>
        <div class="carrito-icono">
            🛒 <span id="contador-carrito">0</span>
        </div>
    </header>

    <main>
        <h1>Nuestro Catálogo</h1>
        <!-- Aquí se inyectarán las tarjetas de productos desde JS -->
        <div id="contenedor-productos" class="grid-productos"></div>
    </main>

    <!-- Panel lateral del carrito -->
    <aside id="panel-carrito" class="oculto">
        <h2>Tu Carrito</h2>
        <div id="items-carrito"></div>
        <div class="total-carrito">
            <strong>Total: $<span id="precio-total">0</span></strong>
        </div>
        <a href="checkout.html" class="btn-checkout">Ir a Pagar</a>
    </aside>

    <script src="js/main.js"></script>
</body>
</html>
